# NAS SSO Gateway — authentik + PostgreSQL + Redis + contact-relay
#
# Security rules enforced by this file (see docs/security.md):
#   - PostgreSQL and Redis publish no host ports — reachable only on the
#     internal Docker network.
#   - The authentik web server and the contact-relay service are the only
#     containers bound to a host port, each to its own
#     ${SSO_BIND_HOST}:port.
#   - All persistent data lives under ${SSO_BASE_PATH}, never a hardcoded
#     Synology volume path.
#
# contact-relay is this repo's own bespoke service (see contact-relay/ and
# ADR-017 in docs/decision-log.md) — everything else here is a third-party
# image. It exists solely to relay the login page's "Contact Support" form
# to an admin inbox over SMTP; it holds no user data of its own.
#
# Public exposure (Cloudflare/DNS/tunnel/certs) is NOT handled here — bring
# whatever reverse-proxy/tunnel/deployer tooling you use, or none at all for
# local-only use. See docs/deployer-integration.md.

services:
  postgresql:
    image: postgres:16.14-alpine
    container_name: sso-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-authentik}
      POSTGRES_USER: ${POSTGRES_USER:-authentik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - ${SSO_BASE_PATH:-./data/sso}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authentik} -d ${POSTGRES_DB:-authentik}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sso-internal
    # No `ports:` — never expose PostgreSQL to the host or the network.

  redis:
    image: redis:7.4.9-alpine
    container_name: sso-redis
    restart: unless-stopped
    command: ["--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ${SSO_BASE_PATH:-./data/sso}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sso-internal
    # No `ports:` — never expose Redis to the host or the network.

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.5.4}
    container_name: sso-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY must be set in .env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?AUTHENTIK_POSTGRES_PASSWORD must be set in .env (keep it equal to POSTGRES_PASSWORD)}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      # SMTP relay for password-reset (Recovery flow) emails — see
      # docs/authentik-manual.md, "Password Reset (Recovery Flow)". Left blank
      # by default; the admin-triggered recovery link still works without it.
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-587}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-true}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL:-false}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-authentik@example.com}
      # Without this, authentik's file-management backend (brand logo/favicon/
      # background uploads) treats /media as unmanageable -- it only trusts a
      # path it can confirm is an actual mount point, and its default
      # (./data) isn't one. Points it at the /media volume already mounted
      # below instead of leaving it default to a non-persistent path.
      AUTHENTIK_STORAGE__MEDIA__FILE__PATH: /media
    volumes:
      - ${SSO_BASE_PATH:-./data/sso}/authentik/media:/media
      - ${SSO_BASE_PATH:-./data/sso}/authentik/custom-templates:/templates
      - ${SSO_BASE_PATH:-./data/sso}/authentik/certs:/certs
    ports:
      - "${SSO_BIND_HOST:-0.0.0.0}:${SSO_HTTP_PORT:-9000}:9000"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sso-internal

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.5.4}
    container_name: sso-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?AUTHENTIK_SECRET_KEY must be set in .env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?AUTHENTIK_POSTGRES_PASSWORD must be set in .env (keep it equal to POSTGRES_PASSWORD)}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      # The worker is what actually sends Recovery-flow emails — see
      # docs/authentik-manual.md, "Password Reset (Recovery Flow)".
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-587}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-true}
      AUTHENTIK_EMAIL__USE_SSL: ${AUTHENTIK_EMAIL__USE_SSL:-false}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-authentik@example.com}
      # See the matching comment on authentik-server -- same reason.
      AUTHENTIK_STORAGE__MEDIA__FILE__PATH: /media
    volumes:
      - ${SSO_BASE_PATH:-./data/sso}/authentik/media:/media
      - ${SSO_BASE_PATH:-./data/sso}/authentik/custom-templates:/templates
      - ${SSO_BASE_PATH:-./data/sso}/authentik/certs:/certs
      # The worker needs Docker access only if you use authentik's Docker
      # service connections (e.g. for outpost auto-deployment). Left out of
      # the MVP; document before enabling.
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sso-internal
    # No `ports:` — the worker has no web UI of its own.

  contact-relay:
    # Bespoke code (contact-relay/), built and published by this repo's own
    # CI to GHCR -- see docs/deployer-integration.md. Unlike authentik above
    # (a pinned third-party image, see ADR-010), this one tracks `latest` and
    # is Watchtower-managed, matching the convention used for this project's
    # own code elsewhere in this ecosystem.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-s2925534}/nas-sso-gateway-contact-relay:${CONTACT_RELAY_TAG:-latest}
    container_name: sso-contact-relay
    restart: unless-stopped
    environment:
      CONTACT_ADMIN_EMAIL: ${CONTACT_ADMIN_EMAIL:?CONTACT_ADMIN_EMAIL must be set in .env}
      CONTACT_ALLOWED_ORIGIN: ${CONTACT_ALLOWED_ORIGIN:?CONTACT_ALLOWED_ORIGIN must be set in .env (the login page's real origin, for CORS)}
      # Separate SMTP config from AUTHENTIK_EMAIL__* on purpose -- this is a
      # different sender identity, and keeping them independent means
      # rotating one relay's credentials never silently breaks the other.
      CONTACT_EMAIL__HOST: ${CONTACT_EMAIL__HOST:-}
      CONTACT_EMAIL__PORT: ${CONTACT_EMAIL__PORT:-587}
      CONTACT_EMAIL__USERNAME: ${CONTACT_EMAIL__USERNAME:-}
      CONTACT_EMAIL__PASSWORD: ${CONTACT_EMAIL__PASSWORD:-}
      CONTACT_EMAIL__USE_TLS: ${CONTACT_EMAIL__USE_TLS:-true}
      CONTACT_EMAIL__USE_SSL: ${CONTACT_EMAIL__USE_SSL:-false}
      CONTACT_EMAIL__FROM: ${CONTACT_EMAIL__FROM:-contact@example.com}
      CONTACT_RATE_LIMIT_MAX: ${CONTACT_RATE_LIMIT_MAX:-5}
      CONTACT_RATE_LIMIT_WINDOW_SECONDS: ${CONTACT_RATE_LIMIT_WINDOW_SECONDS:-3600}
    ports:
      - "${SSO_BIND_HOST:-0.0.0.0}:${CONTACT_RELAY_PORT:-9001}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  sso-internal:
    name: sso-internal
